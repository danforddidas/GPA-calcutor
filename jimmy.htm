

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Calculator</title>
  <link rel="stylesheet" href="standard.css">
</head>
<body>

<div class="container">
  <h1>GPA Calculator System</h1>

  <div class="input-box">
    <input type="text" id="course" placeholder="Course Name">
    <input type="number" id="marks" placeholder="Marks">
    <button onclick="addResult()">Add Result</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Course</th>
        <th>Marks</th>
        <th>Grade</th>
        <th>Point</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="resultTable"></tbody>
  </table>

  <div class="result">
    <h2>GPA: <span id="gpa">0.00</span></h2>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
